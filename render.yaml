services:
  - type: web
    name: rag-video-analytics-backend
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: CHROMA_PERSIST_DIR
        value: /tmp/chroma_db
